<!DOCTYPE html>
<html lang="en">

<head>
    <!-- METADATA: {"title": "{{POST_TITLE}}", "date": "{{POST_DATE}}", "excerpt": "{{POST_EXCERPT}}", "slug": "{{POST_SLUG}}"} -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{POST_TITLE}} | The Lens - Landsick Media Blog</title>
    <meta name="description" content="{{POST_EXCERPT}}">
    <link rel="canonical" href="https://landsickmedia.com/blog/{{POST_SLUG}}.html" />

    <link rel="preload" href="../style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="../style.css"></noscript>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Readex+Pro:wght@200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Load Font Awesome asynchronously -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </noscript>
</head>

<body>
    <header class="header">
        <div class="header-container">
            <nav class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../about.html">About Us</a>
                <a href="../blog.html" class="active">Blog</a>
            </nav>
            <div class="logo">
                <a href="../index.html">
                    <img src="../images/LS_webheadery.webp" alt="Landsick Media" width="245" height="70">
                </a>
            </div>
            <div class="header-actions">
                <a href="tel:907-854-5704" class="phone-link"
                    aria-label="Call Landsick Media at 907-854-5704">907-854-5704</a>
                <a href="../index.html#contact-form" class="btn btn-orange-pill">Let's Chat</a>
            </div>
            <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main>
        <article>
            <section class="page-hero-section">
                <div class="word-cloud" id="word-cloud">
                    {{WORD_CLOUD}}
                </div>
                <div class="post-meta" style="position: relative; z-index: 2;">
                    <span class="blog-date" style="color: var(--orange-main); font-weight: 700; text-transform: uppercase; letter-spacing: 2px;">{{POST_DATE}}</span>
                    <h1 class="post-title" style="margin-top: 1rem;">{{POST_TITLE}}</h1>
                </div>
            </section>

            <section class="post-content-section" style="background-color: #ffffff; color: var(--text-dark); position: relative; padding: calc(10vw + 2rem) 2rem 6rem;">
                <div class="shape-divider shape-top shape-waves">
                    <svg viewBox="0 0 1000 100" preserveAspectRatio="none">
                        <path opacity="0.33" d="M0,60 C300,-20 700,-20 1000,60 V0 H0 Z" fill="#1a1a1a" />
                        <path opacity="0.66" d="M0,80 C300,0 700,0 1000,80 V0 H0 Z" fill="#1a1a1a" />
                        <path d="M0,100 C300,20 700,20 1000,100 V0 H0 Z" fill="#1a1a1a" />
                    </svg>
                </div>
                <div class="post-content" style="max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.1rem;">
                    {{POST_CONTENT}}
                </div>
            </section>
        </article>

        <section class="more-posts-section" style="padding: 5rem 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <div style="max-width: 800px; margin: 0 auto; text-align: center;">
                <h2 style="margin-bottom: 2rem;">Want to see more?</h2>
                <a href="../blog.html" class="btn btn-blue-pill">Back to The Lens</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <img src="../images/LS_webheadery.webp" alt="Landsick Media" width="300" height="86" loading="lazy">
            </div>

            <div class="footer-cta">
                <p>Are you ready to get started?</p>
                <h2>Let's Chat!</h2>
                <div class="footer-contact">
                    <div class="footer-email">hello@landsickmedia.com</div>
                    <div class="footer-phone">907-854-5704</div>
                </div>
            </div>

            <div class="footer-social">
                <a href="https://www.instagram.com/landsickmedia" target="_blank"
                    aria-label="Follow Landsick Media on Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/landsickmedia" target="_blank"
                    aria-label="Follow Landsick Media on Facebook"><i class="fab fa-facebook-f"></i></a>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2026 Landsick Media LLC | All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script>
        // Simple mobile menu toggle
        const menuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                menuBtn.querySelector('i').classList.toggle('fa-bars');
                menuBtn.querySelector('i').classList.toggle('fa-times');
            });
        }
    </script>
</body>

</html>
